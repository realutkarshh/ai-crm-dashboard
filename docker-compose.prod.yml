services:

  backend:

    image: realutkarshh/ai-crm-backend:${BACKEND_TAG}

    container_name: crm-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env.production

    ports:
      - "127.0.0.1:8000:8000"

    networks:
      - default
      - monitoring-net

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:

    image: realutkarshh/ai-crm-frontend:${FRONTEND_TAG}

    container_name: crm-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "127.0.0.1:8080:80"

    networks:
      - default

networks:
  monitoring-net:
    external: true