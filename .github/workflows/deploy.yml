name: Build & Deploy AI CRM

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: realutkarshh/ai-crm-frontend
  BACKEND_IMAGE: realutkarshh/ai-crm-backend

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      # ============================================
      # Checkout Repository
      # ============================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================
      # Setup Docker Buildx
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================
      # Login to Docker Hub
      # ============================================
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ============================================
      # Build & Push Backend
      # ============================================
      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      # ============================================
      # Build & Push Frontend
      # ============================================
      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      # ============================================
      # Deploy to Oracle VPS
      # ============================================
      - name: Deploy to Oracle VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |

            cd /opt/apps/ai-crm-dashboard

            git pull origin main

            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

            docker pull realutkarshh/ai-crm-backend:latest
            docker pull realutkarshh/ai-crm-frontend:latest

            sed -i 's/^BACKEND_TAG=.*/BACKEND_TAG=latest/' .env.compose
            sed -i 's/^FRONTEND_TAG=.*/FRONTEND_TAG=latest/' .env.compose

            docker compose \
              --env-file .env.compose \
              -f docker-compose.prod.yml \
              up -d

            docker image prune -af

            sudo systemctl reload nginx

            docker ps