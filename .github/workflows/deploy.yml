name: Build & Deploy AI CRM

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: realutkarshh/ai-crm-backend
  FRONTEND_IMAGE: realutkarshh/ai-crm-frontend

jobs:

  backend:
    name: Build Backend
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate Short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    needs: backend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ needs.backend.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Oracle VPS

    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |

            set -e

            SHORT_SHA=${{ needs.backend.outputs.short_sha }}

            cd /opt/apps/ai-crm-dashboard

            git pull origin main

            sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=${SHORT_SHA}/" .env.compose
            sed -i "s/^FRONTEND_TAG=.*/FRONTEND_TAG=${SHORT_SHA}/" .env.compose

            docker compose \
              --env-file .env.compose \
              -f docker-compose.prod.yml \
              pull

            docker compose \
              --env-file .env.compose \
              -f docker-compose.prod.yml \
              up -d

            echo "Waiting for backend..."

            for i in {1..20}; do
              if curl -fs http://127.0.0.1:8000/api/health >/dev/null; then
                echo "Backend is healthy."
                break
              fi
              sleep 3
            done

            curl -fs http://127.0.0.1:8000/api/health

            sudo systemctl reload nginx

            docker ps

            echo ""
            echo "======================================"
            echo "Deployment Successful"
            echo "Commit: ${SHORT_SHA}"
            echo "Frontend: ${FRONTEND_IMAGE}:${SHORT_SHA}"
            echo "Backend : ${BACKEND_IMAGE}:${SHORT_SHA}"
            echo "URL: https://aicrmdashboard.ddns.net"
            echo "======================================"